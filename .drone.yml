# Continuous integration pipeline.
# Runs for normal verification and does not publish images.
kind: pipeline
type: docker
name: ci

trigger:
  event:
    - push
    - pull_request
    - tag
    - custom

steps:
  - name: restore
    image: mcr.microsoft.com/dotnet/sdk:10.0
    environment:
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "1"
      DOTNET_NOLOGO: "1"
      NUGET_PACKAGES: /drone/src/.nuget/packages
    commands:
      - dotnet restore Promethix.CloudflareTunnelOperator.slnx

  - name: build
    image: mcr.microsoft.com/dotnet/sdk:10.0
    depends_on:
      - restore
    environment:
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "1"
      DOTNET_NOLOGO: "1"
      NUGET_PACKAGES: /drone/src/.nuget/packages
    commands:
      - dotnet build Promethix.CloudflareTunnelOperator.slnx --configuration Release --no-restore

  - name: test
    image: mcr.microsoft.com/dotnet/sdk:10.0
    depends_on:
      - build
    environment:
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "1"
      DOTNET_NOLOGO: "1"
      NUGET_PACKAGES: /drone/src/.nuget/packages
    commands:
      - dotnet test Promethix.CloudflareTunnelOperator.slnx --configuration Release --no-build --logger "trx;LogFileName=tests.trx"

---
# Alpha image build pipeline.
# Builds once on main and publishes prerelease alpha tags only.
kind: pipeline
type: docker
name: image-publish-alpha

clone:
  depth: 0

trigger:
  event:
    - push
    - custom
  ref:
    - refs/heads/main
  paths:
    include:
      - .drone.yml
      - .drone/version-prefix.env
      - Directory.Build.props
      - Dockerfile
      - Promethix.CloudflareTunnelOperator.slnx
      - src/**
      - tests/**

steps:
  - name: restore
    image: mcr.microsoft.com/dotnet/sdk:10.0
    environment:
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "1"
      DOTNET_NOLOGO: "1"
      NUGET_PACKAGES: /drone/src/.nuget/packages
    commands:
      - dotnet restore Promethix.CloudflareTunnelOperator.slnx

  - name: build
    image: mcr.microsoft.com/dotnet/sdk:10.0
    depends_on:
      - restore
    environment:
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "1"
      DOTNET_NOLOGO: "1"
      NUGET_PACKAGES: /drone/src/.nuget/packages
    commands:
      - dotnet build Promethix.CloudflareTunnelOperator.slnx --configuration Release --no-restore

  - name: test
    image: mcr.microsoft.com/dotnet/sdk:10.0
    depends_on:
      - build
    environment:
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "1"
      DOTNET_NOLOGO: "1"
      NUGET_PACKAGES: /drone/src/.nuget/packages
    commands:
      - dotnet test Promethix.CloudflareTunnelOperator.slnx --configuration Release --no-build --logger "trx;LogFileName=tests.trx"

  - name: calculate-build-metadata
    image: alpine:3.21
    depends_on:
      - test
    commands:
      - 'mkdir -p .drone; if [ -f .drone/version-prefix.env ]; then . .drone/version-prefix.env; fi; buildMajor="$${VERSION_MAJOR:-1}"; buildMinor="$${VERSION_MINOR:-0}"; buildPatch="$${VERSION_PATCH:-0}"; buildNumber="$${DRONE_BUILD_NUMBER:-0}"; buildRevision="$${buildPatch}"; buildSemver="$${buildMajor}.$${buildMinor}.$${buildPatch}"; shortCommit="$(printf "%.7s" "$${DRONE_COMMIT_SHA}")"; alphaTag="$${buildSemver}-alpha-$${shortCommit}.$${buildNumber}"; releaseTag="$${buildSemver}"; buildDisplay="v$${alphaTag}"; buildDate="$(date -u +%Y-%m-%dT%H:%M:%SZ)"; harborImageRepo="harbor.internal.promethix.net/promethix/cloudflare-tunnel-operator"; ghcrImageRepo="ghcr.io/promethixlabs/cloudflare-tunnel-operator"; legacyGhcrImageRepo="ghcr.io/gentoorax/cloudflare-tunnel-operator"; directProductionRelease="$${DIRECT_PRODUCTION_RELEASE:-false}"; printf "BUILD_MAJOR=%s\nBUILD_MINOR=%s\nBUILD_REVISION=%s\nBUILD_PATCH=%s\nBUILD_NUMBER=%s\nBUILD_SEMVER=%s\nALPHA_TAG=%s\nRELEASE_TAG=%s\nSHORT_COMMIT=%s\nBUILD_DISPLAY=%s\nBUILD_DATE=%s\nHARBOR_IMAGE_REPO=%s\nGHCR_IMAGE_REPO=%s\nLEGACY_GHCR_IMAGE_REPO=%s\nDIRECT_PRODUCTION_RELEASE=%s\n" "$${buildMajor}" "$${buildMinor}" "$${buildRevision}" "$${buildPatch}" "$${buildNumber}" "$${buildSemver}" "$${alphaTag}" "$${releaseTag}" "$${shortCommit}" "$${buildDisplay}" "$${buildDate}" "$${harborImageRepo}" "$${ghcrImageRepo}" "$${legacyGhcrImageRepo}" "$${directProductionRelease}" > .drone/build.env'

  - name: announce-build-plan
    image: alpine:3.21
    depends_on:
      - calculate-build-metadata
    commands:
      - '. .drone/build.env; echo "Planned alpha publish:"; echo "  harbor image repo: $${HARBOR_IMAGE_REPO}"; echo "  ghcr image repo: $${GHCR_IMAGE_REPO}"; echo "  legacy ghcr image repo: $${LEGACY_GHCR_IMAGE_REPO}"; echo "  alpha release tag: $${ALPHA_TAG}"; echo "  alpha alias tag: alpha-latest"; if [ "$${DIRECT_PRODUCTION_RELEASE}" = "true" ]; then echo "  production release tag: $${RELEASE_TAG}"; echo "  production alias tag: latest"; fi'

  - name: build-and-push-alpha-image
    image: gcr.io/kaniko-project/executor:v1.23.2-debug
    depends_on:
      - announce-build-plan
    environment:
      HOME: /kaniko
      HARBOR_USERNAME:
        from_secret: harbor_robot_username
      HARBOR_PASSWORD:
        from_secret: harbor_robot_password
      HARBOR_CA_CERT:
        from_secret: harbor_ca_cert
    commands:
      - '. .drone/build.env; if [ -z "$${HARBOR_USERNAME}" ] || [ -z "$${HARBOR_PASSWORD}" ]; then echo "Harbor secrets are missing (harbor_robot_username / harbor_robot_password)"; exit 1; fi; if [ -z "$${HARBOR_CA_CERT}" ]; then echo "Harbor CA secret is missing (harbor_ca_cert)"; exit 1; fi; harborAuth="$(printf "%s:%s" "$${HARBOR_USERNAME}" "$${HARBOR_PASSWORD}" | base64 | tr -d "\n")"; mkdir -p /kaniko/.docker; printf "{\"auths\":{\"harbor.internal.promethix.net\":{\"auth\":\"%s\"}}}" "$${harborAuth}" > /kaniko/.docker/config.json; mkdir -p /kaniko/ssl/certs; printf "%b" "$${HARBOR_CA_CERT}" > /kaniko/ssl/certs/harbor-ca.crt; destinationArgs="--destination $${HARBOR_IMAGE_REPO}:$${ALPHA_TAG} --destination $${HARBOR_IMAGE_REPO}:alpha-latest"; if [ "$${DIRECT_PRODUCTION_RELEASE}" = "true" ]; then destinationArgs="$${destinationArgs} --destination $${HARBOR_IMAGE_REPO}:$${RELEASE_TAG} --destination $${HARBOR_IMAGE_REPO}:latest"; fi; /kaniko/executor --context "$(pwd)" --dockerfile "$(pwd)/Dockerfile" --registry-certificate harbor.internal.promethix.net=/kaniko/ssl/certs/harbor-ca.crt --skip-push-permission-check --push-retry 3 --build-arg BUILD_MAJOR="$${BUILD_MAJOR}" --build-arg BUILD_MINOR="$${BUILD_MINOR}" --build-arg BUILD_REVISION="$${BUILD_REVISION}" --build-arg BUILD_NUMBER="$${BUILD_NUMBER}" --build-arg BUILD_SEMVER="$${BUILD_SEMVER}" --build-arg BUILD_COMMIT_SHA="$${DRONE_COMMIT_SHA}" --build-arg BUILD_DISPLAY="$${BUILD_DISPLAY}" --build-arg BUILD_DATE="$${BUILD_DATE}" $${destinationArgs}'

  - name: publish-alpha-image-to-ghcr
    image: quay.io/skopeo/stable:latest
    depends_on:
      - build-and-push-alpha-image
    environment:
      HOME: /tmp
      HARBOR_USERNAME:
        from_secret: harbor_robot_username
      HARBOR_PASSWORD:
        from_secret: harbor_robot_password
      HARBOR_CA_CERT:
        from_secret: harbor_ca_cert
      GHCR_USERNAME:
        from_secret: ghcr_username
      GHCR_TOKEN:
        from_secret: ghcr_token
    commands:
      - '. .drone/build.env; if [ -z "$${HARBOR_USERNAME}" ] || [ -z "$${HARBOR_PASSWORD}" ]; then echo "Harbor secrets are missing (harbor_robot_username / harbor_robot_password)"; exit 1; fi; if [ -z "$${HARBOR_CA_CERT}" ]; then echo "Harbor CA secret is missing (harbor_ca_cert)"; exit 1; fi; if [ -z "$${GHCR_USERNAME}" ] || [ -z "$${GHCR_TOKEN}" ]; then echo "GHCR secrets are missing (ghcr_username / ghcr_token)"; exit 1; fi; mkdir -p /tmp/harbor-certs; printf "%b" "$${HARBOR_CA_CERT}" > /tmp/harbor-certs/harbor-ca.crt; for imageRepo in "$${GHCR_IMAGE_REPO}" "$${LEGACY_GHCR_IMAGE_REPO}"; do skopeo copy --src-creds "$${HARBOR_USERNAME}:$${HARBOR_PASSWORD}" --dest-creds "$${GHCR_USERNAME}:$${GHCR_TOKEN}" --src-cert-dir /tmp/harbor-certs "docker://$${HARBOR_IMAGE_REPO}:$${ALPHA_TAG}" "docker://$${imageRepo}:$${ALPHA_TAG}"; skopeo copy --src-creds "$${HARBOR_USERNAME}:$${HARBOR_PASSWORD}" --dest-creds "$${GHCR_USERNAME}:$${GHCR_TOKEN}" --src-cert-dir /tmp/harbor-certs "docker://$${HARBOR_IMAGE_REPO}:alpha-latest" "docker://$${imageRepo}:alpha-latest"; if [ "$${DIRECT_PRODUCTION_RELEASE}" = "true" ]; then skopeo copy --src-creds "$${HARBOR_USERNAME}:$${HARBOR_PASSWORD}" --dest-creds "$${GHCR_USERNAME}:$${GHCR_TOKEN}" --src-cert-dir /tmp/harbor-certs "docker://$${HARBOR_IMAGE_REPO}:$${RELEASE_TAG}" "docker://$${imageRepo}:$${RELEASE_TAG}"; skopeo copy --src-creds "$${HARBOR_USERNAME}:$${HARBOR_PASSWORD}" --dest-creds "$${GHCR_USERNAME}:$${GHCR_TOKEN}" --src-cert-dir /tmp/harbor-certs "docker://$${HARBOR_IMAGE_REPO}:latest" "docker://$${imageRepo}:latest"; fi; done'

  - name: resolve-published-image-digests
    image: quay.io/skopeo/stable:latest
    depends_on:
      - publish-alpha-image-to-ghcr
    environment:
      HOME: /tmp
      HARBOR_USERNAME:
        from_secret: harbor_robot_username
      HARBOR_PASSWORD:
        from_secret: harbor_robot_password
      HARBOR_CA_CERT:
        from_secret: harbor_ca_cert
      GHCR_USERNAME:
        from_secret: ghcr_username
      GHCR_TOKEN:
        from_secret: ghcr_token
    commands:
      - '. .drone/build.env; mkdir -p /tmp/harbor-certs; printf "%b" "$${HARBOR_CA_CERT}" > /tmp/harbor-certs/harbor-ca.crt; harborDigest="$(skopeo inspect --format "{{.Digest}}" --creds "$${HARBOR_USERNAME}:$${HARBOR_PASSWORD}" --cert-dir /tmp/harbor-certs "docker://$${HARBOR_IMAGE_REPO}:$${ALPHA_TAG}")"; ghcrDigest="$(skopeo inspect --format "{{.Digest}}" --creds "$${GHCR_USERNAME}:$${GHCR_TOKEN}" "docker://$${GHCR_IMAGE_REPO}:$${ALPHA_TAG}")"; printf "HARBOR_IMAGE_DIGEST=%s\nGHCR_IMAGE_DIGEST=%s\nHARBOR_IMAGE_REF=%s@%s\nGHCR_IMAGE_REF=%s@%s\n" "$${harborDigest}" "$${ghcrDigest}" "$${HARBOR_IMAGE_REPO}" "$${harborDigest}" "$${GHCR_IMAGE_REPO}" "$${ghcrDigest}" > .drone/digests.env; echo "Resolved Harbor image: $${HARBOR_IMAGE_REPO}@$${harborDigest}"; echo "Resolved GHCR image: $${GHCR_IMAGE_REPO}@$${ghcrDigest}"'

  - name: generate-provenance
    image: alpine:3.21
    depends_on:
      - resolve-published-image-digests
    commands:
      - 'apk add --no-cache jq'
      - '. .drone/build.env; . .drone/digests.env; mkdir -p .drone/attestations; jq -n --arg repo "$${DRONE_REPO}" --arg commit "$${DRONE_COMMIT_SHA}" --arg version "$${ALPHA_TAG}" --arg buildNumber "$${DRONE_BUILD_NUMBER}" --arg buildUrl "$${DRONE_BUILD_LINK}" --arg workflow "$${DRONE_STAGE_NAME:-image-publish-alpha}" --arg builder "drone.promethix.net/$${DRONE_REPO}" --arg image "$${HARBOR_IMAGE_REPO}" --arg digest "$${HARBOR_IMAGE_DIGEST}" "{builder:{id:\$builder},buildType:\"https://drone.io/pipeline\",invocation:{configSource:{uri:(\"git+https://github.com/\" + \$repo),digest:{sha1:\$commit},entryPoint:\$workflow},parameters:{repository:\$repo,commit:\$commit,version:\$version,droneBuildNumber:\$buildNumber,droneBuildUrl:\$buildUrl,pipeline:\$workflow,imageDigest:\$digest}},metadata:{buildInvocationId:\$buildNumber,completeness:{parameters:true,environment:false,materials:true},reproducible:false},materials:[{uri:(\"git+https://github.com/\" + \$repo),digest:{sha1:\$commit}},{uri:(\"pkg:docker/\" + \$image),digest:{sha256:(\$digest | sub(\"^sha256:\"; \"\"))}}]}" > .drone/attestations/provenance.slsa.json'

  - name: generate-sbom
    image: alpine:3.21
    depends_on:
      - resolve-published-image-digests
    commands:
      - 'apk add --no-cache ca-certificates curl'
      - 'curl -sSfL https://raw.githubusercontent.com/anchore/syft/v1.20.0/install.sh | sh -s -- -b /usr/local/bin v1.20.0'
      - 'mkdir -p .drone/attestations'
      - 'syft dir:. -o spdx-json=.drone/attestations/sbom.spdx.json'

  - name: sign-and-attest-images
    image: alpine:3.21
    depends_on:
      - generate-provenance
      - generate-sbom
    environment:
      VAULT_ADDR:
        from_secret: vault_addr
      VAULT_TOKEN:
        from_secret: vault_token
      VAULT_CACERT_PEM_B64:
        from_secret: vault_cacert_pem_b64
      GHCR_USERNAME:
        from_secret: ghcr_username
      GHCR_TOKEN:
        from_secret: ghcr_token
      HARBOR_CA_CERT:
        from_secret: harbor_ca_cert
      HARBOR_USERNAME:
        from_secret: harbor_robot_username
      HARBOR_PASSWORD:
        from_secret: harbor_robot_password
    commands:
      - 'apk add --no-cache ca-certificates cosign'
      - '. .drone/digests.env; if [ -z "$${VAULT_ADDR}" ] || [ -z "$${VAULT_TOKEN}" ] || [ -z "$${VAULT_CACERT_PEM_B64}" ]; then echo "Vault signing secrets are missing"; exit 1; fi; if [ -z "$${HARBOR_CA_CERT}" ]; then echo "Harbor CA secret is missing"; exit 1; fi'
      - 'mkdir -p /tmp/promethix-certs; trap "rm -rf /tmp/promethix-certs" EXIT; printf "%s" "$${VAULT_CACERT_PEM_B64}" | tr -d "\r\n " | base64 -d > /tmp/promethix-certs/vault-ca.crt; printf "%b" "$${HARBOR_CA_CERT}" > /tmp/promethix-certs/harbor-ca.crt; cat /etc/ssl/certs/ca-certificates.crt /tmp/promethix-certs/vault-ca.crt /tmp/promethix-certs/harbor-ca.crt > /tmp/promethix-certs/ca-bundle.crt; export VAULT_CACERT=/tmp/promethix-certs/vault-ca.crt; export SSL_CERT_FILE=/tmp/promethix-certs/ca-bundle.crt; export TRANSIT_SECRET_ENGINE_PATH=transit'
      - 'cosign login harbor.internal.promethix.net --username "$${HARBOR_USERNAME}" --password "$${HARBOR_PASSWORD}"'
      - 'cosign login ghcr.io --username "$${GHCR_USERNAME}" --password "$${GHCR_TOKEN}"'
      - 'cosign sign --yes --key hashivault://promethix-code-signing "$${HARBOR_IMAGE_REF}"'
      - 'cosign sign --yes --key hashivault://promethix-code-signing "$${GHCR_IMAGE_REF}"'
      - 'cosign attest --yes --key hashivault://promethix-code-signing --type slsaprovenance --predicate .drone/attestations/provenance.slsa.json "$${HARBOR_IMAGE_REF}"'
      - 'cosign attest --yes --key hashivault://promethix-code-signing --type slsaprovenance --predicate .drone/attestations/provenance.slsa.json "$${GHCR_IMAGE_REF}"'
      - 'cosign attest --yes --key hashivault://promethix-code-signing --type spdxjson --predicate .drone/attestations/sbom.spdx.json "$${HARBOR_IMAGE_REF}"'
      - 'cosign attest --yes --key hashivault://promethix-code-signing --type spdxjson --predicate .drone/attestations/sbom.spdx.json "$${GHCR_IMAGE_REF}"'
  - name: mirror-to-gitea
    image: alpine:3.21
    depends_on:
      - sign-and-attest-images
    environment:
      HOME: /root
      GITEA_MIRROR_SSH_KEY:
        from_secret: gitea_mirror_ssh_key
    commands:
      - 'if [ -z "$${GITEA_MIRROR_SSH_KEY}" ]; then echo "Gitea mirror SSH key secret is missing (gitea_mirror_ssh_key)"; exit 1; fi'
      - 'apk add --no-cache git openssh-client'
      - 'mkdir -p /root/.ssh'
      - 'printf "%s" "$${GITEA_MIRROR_SSH_KEY}" | tr -d "\r\n " | base64 -d > /root/.ssh/id_ed25519'
      - 'chmod 600 /root/.ssh/id_ed25519'
      - 'ssh-keygen -y -f /root/.ssh/id_ed25519 > /dev/null || { echo "Invalid Gitea mirror SSH private key format"; exit 1; }'
      - 'git fetch --prune --tags origin'
      - 'git remote remove gitea-mirror || true'
      - 'git remote add gitea-mirror ssh://git@gitea-ssh-clusterip.gitea.svc.cluster.local:22/chris/Promethix.Operator.CloudflareRouter.git'
      - 'GIT_SSH_COMMAND="ssh -i /root/.ssh/id_ed25519 -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new" git push gitea-mirror HEAD:refs/heads/main'

---
# Internal tag mirror pipeline.
# Mirrors trusted release tags back to internal Gitea over SSH.
kind: pipeline
type: docker
name: mirror-internal-tag

clone:
  depth: 0

trigger:
  event:
    - tag

steps:
  - name: mirror-tag-to-gitea
    image: alpine:3.21
    environment:
      HOME: /root
      GITEA_MIRROR_SSH_KEY:
        from_secret: gitea_mirror_ssh_key
    commands:
      - 'if [ -z "$${GITEA_MIRROR_SSH_KEY}" ]; then echo "Gitea mirror SSH key secret is missing (gitea_mirror_ssh_key)"; exit 1; fi'
      - 'if [ -z "$${DRONE_TAG}" ]; then echo "DRONE_TAG is empty"; exit 1; fi'
      - 'apk add --no-cache git openssh-client'
      - 'mkdir -p /root/.ssh'
      - 'printf "%s" "$${GITEA_MIRROR_SSH_KEY}" | tr -d "\r\n " | base64 -d > /root/.ssh/id_ed25519'
      - 'chmod 600 /root/.ssh/id_ed25519'
      - 'ssh-keygen -y -f /root/.ssh/id_ed25519 > /dev/null || { echo "Invalid Gitea mirror SSH private key format"; exit 1; }'
      - 'git fetch --prune --tags origin'
      - 'git remote remove gitea-mirror || true'
      - 'git remote add gitea-mirror ssh://git@gitea-ssh-clusterip.gitea.svc.cluster.local:22/chris/Promethix.Operator.CloudflareRouter.git'
      - 'GIT_SSH_COMMAND="ssh -i /root/.ssh/id_ed25519 -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new" git push gitea-mirror "refs/tags/$${DRONE_TAG}:refs/tags/$${DRONE_TAG}"'

---
# Public Helm chart repository pipeline.
# Publishes packaged charts to GitHub Pages on SemVer tags only.
# Stable tags publish normal Helm versions. Prerelease tags publish Helm prereleases,
# which Helm hides unless users pass --devel.
kind: pipeline
type: docker
name: publish-helm-chart

clone:
  depth: 0

trigger:
  event:
    - tag

steps:
  - name: publish-chart-to-github-pages
    image: alpine:3.21
    environment:
      HOME: /root
      PROMETHIXLABS_CHARTS_SSH_KEY:
        from_secret: promethixlabs_charts_ssh_key
    commands:
      - 'if [ -z "$${DRONE_TAG}" ]; then echo "DRONE_TAG is empty"; exit 1; fi'
      - 'if [ -z "$${PROMETHIXLABS_CHARTS_SSH_KEY}" ]; then echo "Promethix Labs charts SSH key secret is missing (promethixlabs_charts_ssh_key)"; exit 1; fi'
      - 'apk add --no-cache curl git openssh-client tar gzip'
      - 'chartVersion="$${DRONE_TAG#v}"; printf "%s" "$${chartVersion}" | grep -Eq "^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\\+[0-9A-Za-z.-]+)?$" || { echo "Tag $${DRONE_TAG} is not a valid Helm SemVer version"; exit 1; }'
      - 'curl -fsSL -o /tmp/helm.tar.gz https://get.helm.sh/helm-v3.17.3-linux-amd64.tar.gz'
      - 'tar -xzf /tmp/helm.tar.gz -C /tmp'
      - 'mv /tmp/linux-amd64/helm /usr/local/bin/helm'
      - 'sed -i -E "s/^version:.*/version: $${chartVersion}/; s/^appVersion:.*/appVersion: \"$${chartVersion}\"/" charts/promethix-cloudflare-tunnel-operator/Chart.yaml'
      - 'mkdir -p .helm-dist'
      - 'helm package charts/promethix-cloudflare-tunnel-operator --destination .helm-dist'
      - 'mkdir -p /root/.ssh'
      - 'printf "%s" "$${PROMETHIXLABS_CHARTS_SSH_KEY}" | tr -d "\r\n " | base64 -d > /root/.ssh/id_ed25519'
      - 'chmod 600 /root/.ssh/id_ed25519'
      - 'ssh-keygen -y -f /root/.ssh/id_ed25519 > /dev/null || { echo "Invalid GitHub Pages SSH private key format"; exit 1; }'
      - 'GIT_SSH_COMMAND="ssh -i /root/.ssh/id_ed25519 -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new" git clone --branch gh-pages --depth 1 git@github.com:promethixlabs/charts.git /tmp/gh-pages'
      - 'cp .helm-dist/*.tgz /tmp/gh-pages/'
      - 'helm repo index /tmp/gh-pages --url https://promethixlabs.github.io/charts --merge /tmp/gh-pages/index.yaml'
      - 'cd /tmp/gh-pages'
      - 'git config user.name "Drone CI"'
      - 'git config user.email "drone@users.noreply.github.com"'
      - 'git add index.yaml *.tgz'
      - 'git diff --cached --quiet && { echo "No Helm chart changes to publish"; exit 0; }'
      - 'git commit -m "Publish Helm chart $${chartVersion}"'
      - 'GIT_SSH_COMMAND="ssh -i /root/.ssh/id_ed25519 -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new" git push origin gh-pages'

---
# Production promotion pipeline.
# Retags an existing alpha image to live production aliases without rebuilding it.
kind: pipeline
type: docker
name: promote-production

trigger:
  event:
    - promote
  target:
    - production

steps:
  - name: resolve-production-tags
    image: quay.io/skopeo/stable:latest
    environment:
      HOME: /tmp
      HARBOR_USERNAME:
        from_secret: harbor_robot_username
      HARBOR_PASSWORD:
        from_secret: harbor_robot_password
      HARBOR_CA_CERT:
        from_secret: harbor_ca_cert
    commands:
      - 'mkdir -p .drone; if [ -z "$${HARBOR_USERNAME}" ] || [ -z "$${HARBOR_PASSWORD}" ]; then echo "Harbor secrets are missing (harbor_robot_username / harbor_robot_password)"; exit 1; fi; if [ -z "$${HARBOR_CA_CERT}" ]; then echo "Harbor CA secret is missing (harbor_ca_cert)"; exit 1; fi; mkdir -p /tmp/harbor-certs; printf "%b" "$${HARBOR_CA_CERT}" > /tmp/harbor-certs/harbor-ca.crt; harborImageRepo="harbor.internal.promethix.net/promethix/cloudflare-tunnel-operator"; ghcrImageRepo="ghcr.io/promethixlabs/cloudflare-tunnel-operator"; legacyGhcrImageRepo="ghcr.io/gentoorax/cloudflare-tunnel-operator"; sourceTag="$${SOURCE_IMAGE_TAG:-alpha-latest}"; configJson="$(skopeo inspect --config --creds "$${HARBOR_USERNAME}:$${HARBOR_PASSWORD}" --cert-dir /tmp/harbor-certs "docker://$${harborImageRepo}:$${sourceTag}")"; buildSemver="$(printf "%s" "$${configJson}" | grep -o "\"org.opencontainers.image.version\":[[:space:]]*\"[^\"]*\"" | head -n 1 | sed "s/^\"org.opencontainers.image.version\":[[:space:]]*\"//; s/\"$//")"; if [ -z "$${buildSemver}" ]; then echo "Unable to resolve image metadata from $${harborImageRepo}:$${sourceTag}"; echo "$${configJson}"; exit 1; fi; releaseTag="$${buildSemver}"; printf "HARBOR_IMAGE_REPO=%s\nGHCR_IMAGE_REPO=%s\nLEGACY_GHCR_IMAGE_REPO=%s\nSOURCE_TAG=%s\nBUILD_SEMVER=%s\nRELEASE_TAG=%s\n" "$${harborImageRepo}" "$${ghcrImageRepo}" "$${legacyGhcrImageRepo}" "$${sourceTag}" "$${buildSemver}" "$${releaseTag}" > .drone/promote-production.env'

  - name: announce-production-promotion
    image: alpine:3.21
    depends_on:
      - resolve-production-tags
    commands:
      - '. .drone/promote-production.env'
      - 'echo "Planned production promotion:"'
      - 'echo "  source alpha tag: $${SOURCE_TAG}"'
      - 'echo "  latest"'
      - 'echo "  $${RELEASE_TAG}"'

  - name: retag-image-for-production
    image: quay.io/skopeo/stable:latest
    depends_on:
      - announce-production-promotion
    environment:
      HOME: /tmp
      HARBOR_USERNAME:
        from_secret: harbor_robot_username
      HARBOR_PASSWORD:
        from_secret: harbor_robot_password
      HARBOR_CA_CERT:
        from_secret: harbor_ca_cert
      GHCR_USERNAME:
        from_secret: ghcr_username
      GHCR_TOKEN:
        from_secret: ghcr_token
    commands:
      - '. .drone/promote-production.env'
      - 'if [ -z "$${GHCR_USERNAME}" ] || [ -z "$${GHCR_TOKEN}" ]; then echo "GHCR secrets are missing (ghcr_username / ghcr_token)"; exit 1; fi'
      - 'mkdir -p /tmp/harbor-certs'
      - 'printf "%b" "$${HARBOR_CA_CERT}" > /tmp/harbor-certs/harbor-ca.crt'
      - 'skopeo copy --src-creds "$${HARBOR_USERNAME}:$${HARBOR_PASSWORD}" --dest-creds "$${HARBOR_USERNAME}:$${HARBOR_PASSWORD}" --src-cert-dir /tmp/harbor-certs --dest-cert-dir /tmp/harbor-certs "docker://$${HARBOR_IMAGE_REPO}:$${SOURCE_TAG}" "docker://$${HARBOR_IMAGE_REPO}:$${RELEASE_TAG}"'
      - 'skopeo copy --src-creds "$${HARBOR_USERNAME}:$${HARBOR_PASSWORD}" --dest-creds "$${HARBOR_USERNAME}:$${HARBOR_PASSWORD}" --src-cert-dir /tmp/harbor-certs --dest-cert-dir /tmp/harbor-certs "docker://$${HARBOR_IMAGE_REPO}:$${SOURCE_TAG}" "docker://$${HARBOR_IMAGE_REPO}:latest"'
      - 'for imageRepo in "$${GHCR_IMAGE_REPO}" "$${LEGACY_GHCR_IMAGE_REPO}"; do skopeo copy --src-creds "$${HARBOR_USERNAME}:$${HARBOR_PASSWORD}" --dest-creds "$${GHCR_USERNAME}:$${GHCR_TOKEN}" --src-cert-dir /tmp/harbor-certs "docker://$${HARBOR_IMAGE_REPO}:$${SOURCE_TAG}" "docker://$${imageRepo}:$${RELEASE_TAG}"; skopeo copy --src-creds "$${HARBOR_USERNAME}:$${HARBOR_PASSWORD}" --dest-creds "$${GHCR_USERNAME}:$${GHCR_TOKEN}" --src-cert-dir /tmp/harbor-certs "docker://$${HARBOR_IMAGE_REPO}:$${SOURCE_TAG}" "docker://$${imageRepo}:latest"; done'

  - name: tag-promoted-release
    image: alpine:3.21
    depends_on:
      - retag-image-for-production
    environment:
      HOME: /root
      GITHUB_RELEASE_TAG_SSH_KEY:
        from_secret: github_pages_ssh_key
    commands:
      - '. .drone/promote-production.env'
      - 'if [ -z "$${GITHUB_RELEASE_TAG_SSH_KEY}" ]; then echo "GitHub release tag SSH key secret is missing (github_pages_ssh_key)"; exit 1; fi'
      - 'apk add --no-cache git openssh-client'
      - 'releaseGitTag="v$${RELEASE_TAG}"'
      - 'mkdir -p /root/.ssh'
      - 'printf "%s" "$${GITHUB_RELEASE_TAG_SSH_KEY}" | tr -d "\r\n " | base64 -d > /root/.ssh/id_ed25519'
      - 'chmod 600 /root/.ssh/id_ed25519'
      - 'ssh-keygen -y -f /root/.ssh/id_ed25519 > /dev/null || { echo "Invalid GitHub SSH private key format"; exit 1; }'
      - 'git fetch --prune --tags origin'
      - 'if git rev-parse -q --verify "refs/tags/$${releaseGitTag}" >/dev/null; then echo "Release tag $${releaseGitTag} already exists"; exit 0; fi'
      - 'git config user.name "Drone CI"'
      - 'git config user.email "drone@users.noreply.github.com"'
      - 'git tag -a "$${releaseGitTag}" -m "Release $${RELEASE_TAG}" "$${DRONE_COMMIT_SHA}"'
      - 'GIT_SSH_COMMAND="ssh -i /root/.ssh/id_ed25519 -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new" git push git@github.com:PromethixLabs/Promethix.Operator.CloudflareRouter.git "refs/tags/$${releaseGitTag}"'
