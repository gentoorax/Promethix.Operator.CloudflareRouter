replicaCount: 1

image:
  repository: ghcr.io/promethixlabs/cloudflare-tunnel-operator
  tag: ""
  pullPolicy: IfNotPresent

namespaceOverride: cloudflare-tunnel-operator-system

serviceAccount:
  create: true
  name: ""

service:
  port: 8080

cloudflare:
  existingSecretName: cloudflare-tunnel-operator
  apiTokenKey: CLOUDFLARE_API_TOKEN
  accountIdKey: CLOUDFLARE_ACCOUNT_ID
  tunnelIdKey: CLOUDFLARE_TUNNEL_ID
  zoneIdKey: CLOUDFLARE_ZONE_ID

operator:
  managedClassName: public
  managedTunnelName: public-tunnel
  managedIngressClassName: traefik-cloudflare-tunnel
  ingressTargetUrl: https://traefik-cloudflare-tunnel.traefik.svc.cluster.local
  allowIngressServiceOverride: false
  ingressServiceOverrideMode: Disabled
  allowCrossNamespaceDirectTargets: false
  enforceNamespaceHostnamePolicy: true
  allowedHostnameSuffixesAnnotation: edge.promethix.net/allowed-hostname-suffixes
  allowedHostnameSuffixes: ""
  managedFinalizerName: edge.promethix.net/tunnelpublichostname-protection
  ownershipTag: promethix-cloudflare-tunnel-operator
  ownershipConfigMapNamespace: cloudflare-tunnel-operator-system
  ownershipConfigMapName: promethix-cloudflare-tunnel-operator-ownership
  applyChanges: false
  mutationMode: Full
  startupProtectionEnabled: true
  maxDeleteCount: 5
  maxDeletePercentage: 50
  reconciliationIntervalSeconds: 30
  securityPolicies:
    enabled: false
  allowEnterpriseOnlyRateLimitActions: false

webhook:
  enabled: false
  port: 8443
  path: /admission/validate-tunnelpublichostname
  failurePolicy: Fail
  certificate:
    secretName: promethix-cloudflare-tunnel-operator-webhook-tls # use a dedicated secret for webhook TLS; changing this rotates the managed Certificate identity as well
    issuerRef:
      name: "" # required when webhook.enabled=true
      kind: ClusterIssuer # or Issuer for namespace-scoped issuers
      group: cert-manager.io

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi
