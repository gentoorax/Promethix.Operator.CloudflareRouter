apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: tunnelpublichostnames.edge.promethix.net
spec:
  group: edge.promethix.net
  scope: Namespaced
  names:
    plural: tunnelpublichostnames
    singular: tunnelpublichostname
    kind: TunnelPublicHostname
    shortNames:
      - tph
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: ["className", "hostname", "tunnelRef"]
              x-kubernetes-validations:
                - rule: "!self.hostname.startsWith('*.')"
                  message: "Wildcard hostnames are not supported."
                - rule: "has(self.target) != has(self.origin)"
                  message: "Specify either spec.target or legacy spec.origin, but not both."
                - rule: "!has(self.target) || has(self.target.mode)"
                  message: "spec.target.mode is required when spec.target is supplied."
                - rule: "!has(self.target) || self.target.mode != 'ingress' || has(self.target.ingress)"
                  message: "spec.target.ingress is required when spec.target.mode is ingress."
                - rule: "!has(self.target) || self.target.mode != 'direct' || has(self.target.direct)"
                  message: "spec.target.direct is required when spec.target.mode is direct."
                - rule: "!has(self.target) || self.target.mode != 'ingress' || !has(self.target.direct)"
                  message: "spec.target.direct must not be supplied when spec.target.mode is ingress."
                - rule: "!has(self.target) || self.target.mode != 'direct' || !has(self.target.ingress)"
                  message: "spec.target.ingress must not be supplied when spec.target.mode is direct."
                - rule: "!has(self.target) || self.target.mode != 'direct' || !has(self.target.direct) || has(self.target.direct.service) != has(self.target.direct.url)"
                  message: "spec.target.direct must specify either service or url, but not both."
                - rule: "!has(self.target) || self.target.mode != 'direct' || !has(self.target.direct) || has(self.target.direct.service) || has(self.target.direct.protocol)"
                  message: "spec.target.direct.protocol is required when spec.target.direct.url is used."
              properties:
                className:
                  type: string
                  minLength: 1
                hostname:
                  type: string
                  minLength: 1
                enabled:
                  type: boolean
                tunnelRef:
                  type: object
                  required: ["name"]
                  properties:
                    name:
                      type: string
                      minLength: 1
                target:
                  type: object
                  properties:
                    mode:
                      type: string
                      enum: ["ingress", "direct"]
                    ingress:
                      type: object
                      required: ["className"]
                      properties:
                        className:
                          type: string
                          minLength: 1
                        service:
                          type: object
                          required: ["name", "namespace", "port", "scheme"]
                          properties:
                            name:
                              type: string
                              minLength: 1
                            namespace:
                              type: string
                              minLength: 1
                            port:
                              type: integer
                              minimum: 1
                            scheme:
                              type: string
                              enum: ["http", "https"]
                    direct:
                      type: object
                      properties:
                        url:
                          type: string
                        protocol:
                          type: string
                          enum: ["http", "https"]
                        service:
                          type: object
                          required: ["name", "namespace", "port", "scheme"]
                          properties:
                            name:
                              type: string
                              minLength: 1
                            namespace:
                              type: string
                              minLength: 1
                            port:
                              type: integer
                              minimum: 1
                            scheme:
                              type: string
                              enum: ["http", "https"]
                origin:
                  type: object
                  required: ["url", "protocol"]
                  properties:
                    url:
                      type: string
                    protocol:
                      type: string
                      enum: ["http", "https"]
                cloudflare:
                  type: object
                  properties:
                    proxied:
                      type: boolean
            status:
              type: object
              properties:
                observedGeneration:
                  type: integer
                  format: int64
                ownershipTag:
                  type: string
                appliedTunnelName:
                  type: string
                appliedHostname:
                  type: string
                conditions:
                  type: array
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
