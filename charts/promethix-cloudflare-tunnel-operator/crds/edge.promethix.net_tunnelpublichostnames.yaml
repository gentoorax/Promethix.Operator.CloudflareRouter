apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: tunnelpublichostnames.edge.promethix.net
spec:
  group: edge.promethix.net
  scope: Namespaced
  names:
    plural: tunnelpublichostnames
    singular: tunnelpublichostname
    kind: TunnelPublicHostname
    shortNames:
      - tph
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: ["className", "hostname", "tunnelRef"]
              properties:
                className:
                  type: string
                hostname:
                  type: string
                enabled:
                  type: boolean
                tunnelRef:
                  type: object
                  required: ["name"]
                  properties:
                    name:
                      type: string
                target:
                  type: object
                  properties:
                    mode:
                      type: string
                      enum: ["ingress", "direct"]
                    ingress:
                      type: object
                      required: ["className"]
                      properties:
                        className:
                          type: string
                        service:
                          type: object
                          required: ["name", "namespace", "port", "scheme"]
                          properties:
                            name:
                              type: string
                            namespace:
                              type: string
                            port:
                              type: integer
                              minimum: 1
                            scheme:
                              type: string
                              enum: ["http", "https"]
                    direct:
                      type: object
                      properties:
                        url:
                          type: string
                        protocol:
                          type: string
                          enum: ["http", "https"]
                        service:
                          type: object
                          required: ["name", "namespace", "port", "scheme"]
                          properties:
                            name:
                              type: string
                            namespace:
                              type: string
                            port:
                              type: integer
                              minimum: 1
                            scheme:
                              type: string
                              enum: ["http", "https"]
                origin:
                  type: object
                  required: ["url", "protocol"]
                  properties:
                    url:
                      type: string
                    protocol:
                      type: string
                      enum: ["http", "https"]
                cloudflare:
                  type: object
                  properties:
                    proxied:
                      type: boolean
            status:
              type: object
              properties:
                observedGeneration:
                  type: integer
                  format: int64
                ownershipTag:
                  type: string
                appliedTunnelName:
                  type: string
                appliedHostname:
                  type: string
                conditions:
                  type: array
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
