apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "promethix-cloudflare-tunnel-operator.name" . }}
  namespace: {{ include "promethix-cloudflare-tunnel-operator.namespace" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "promethix-cloudflare-tunnel-operator.name" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "promethix-cloudflare-tunnel-operator.name" . }}
    spec:
      serviceAccountName: {{ include "promethix-cloudflare-tunnel-operator.serviceAccountName" . }}
      containers:
        - name: operator
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: CloudflareTunnel__ApiToken
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.cloudflare.existingSecretName }}
                  key: {{ .Values.cloudflare.apiTokenKey }}
            - name: CloudflareTunnel__AccountId
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.cloudflare.existingSecretName }}
                  key: {{ .Values.cloudflare.accountIdKey }}
            - name: CloudflareTunnel__TunnelId
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.cloudflare.existingSecretName }}
                  key: {{ .Values.cloudflare.tunnelIdKey }}
            {{- if .Values.operator.securityPolicies.enabled }}
            {{- $zoneMappings := .Values.cloudflare.zoneMappings | default (list) }}
            {{- if gt (len $zoneMappings) 0 }}
            {{- range $index, $mapping := $zoneMappings }}
            - name: CloudflareTunnel__ZoneMappings__{{ $index }}__HostnameSuffix
              value: {{ $mapping.hostnameSuffix | quote }}
            - name: CloudflareTunnel__ZoneMappings__{{ $index }}__ZoneId
              value: {{ $mapping.zoneId | quote }}
            {{- end }}
            {{- else if .Values.cloudflare.zoneIdKey }}
            - name: CloudflareTunnel__ZoneId
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.cloudflare.existingSecretName }}
                  key: {{ .Values.cloudflare.zoneIdKey }}
            {{- end }}
            {{- end }}
            - name: KubernetesOperator__ManagedClassName
              value: {{ .Values.operator.managedClassName | quote }}
            - name: KubernetesOperator__ManagedTunnelName
              value: {{ .Values.operator.managedTunnelName | quote }}
            - name: KubernetesOperator__ManagedIngressClassName
              value: {{ .Values.operator.managedIngressClassName | quote }}
            - name: KubernetesOperator__IngressTargetUrl
              value: {{ .Values.operator.ingressTargetUrl | quote }}
            - name: KubernetesOperator__AllowIngressServiceOverride
              value: {{ .Values.operator.allowIngressServiceOverride | quote }}
            - name: KubernetesOperator__IngressServiceOverrideMode
              value: {{ .Values.operator.ingressServiceOverrideMode | quote }}
            - name: KubernetesOperator__AllowCrossNamespaceDirectTargets
              value: {{ .Values.operator.allowCrossNamespaceDirectTargets | quote }}
            - name: KubernetesOperator__EnforceNamespaceHostnamePolicy
              value: {{ .Values.operator.enforceNamespaceHostnamePolicy | quote }}
            - name: KubernetesOperator__AllowedHostnameSuffixesAnnotation
              value: {{ .Values.operator.allowedHostnameSuffixesAnnotation | quote }}
            - name: KubernetesOperator__AllowedHostnameSuffixes
              value: {{ .Values.operator.allowedHostnameSuffixes | quote }}
            - name: KubernetesOperator__ManagedFinalizerName
              value: {{ .Values.operator.managedFinalizerName | quote }}
            - name: KubernetesOperator__OwnershipConfigMapNamespace
              value: {{ .Values.operator.ownershipConfigMapNamespace | quote }}
            - name: KubernetesOperator__OwnershipConfigMapName
              value: {{ .Values.operator.ownershipConfigMapName | quote }}
            - name: RoutingOperator__OwnershipTag
              value: {{ .Values.operator.ownershipTag | quote }}
            - name: CloudflareTunnel__OwnershipTag
              value: {{ .Values.operator.ownershipTag | quote }}
            - name: RoutingOperator__ApplyChanges
              value: {{ .Values.operator.applyChanges | quote }}
            - name: RoutingOperator__MutationMode
              value: {{ .Values.operator.mutationMode | quote }}
            - name: RoutingOperator__StartupProtectionEnabled
              value: {{ .Values.operator.startupProtectionEnabled | quote }}
            - name: RoutingOperator__MaxDeleteCount
              value: {{ .Values.operator.maxDeleteCount | quote }}
            - name: RoutingOperator__MaxDeletePercentage
              value: {{ .Values.operator.maxDeletePercentage | quote }}
            - name: RoutingOperator__SecurityPoliciesEnabled
              value: {{ .Values.operator.securityPolicies.enabled | quote }}
            - name: RoutingOperator__AllowEnterpriseOnlyRateLimitActions
              value: {{ .Values.operator.allowEnterpriseOnlyRateLimitActions | quote }}
            - name: RoutingOperator__ReconciliationIntervalSeconds
              value: {{ .Values.operator.reconciliationIntervalSeconds | quote }}
            - name: AdmissionWebhook__Enabled
              value: {{ .Values.webhook.enabled | quote }}
            - name: AdmissionWebhook__ManagementPort
              value: {{ .Values.service.port | quote }}
            - name: AdmissionWebhook__Port
              value: {{ .Values.webhook.port | quote }}
            - name: AdmissionWebhook__Path
              value: {{ .Values.webhook.path | quote }}
            - name: AdmissionWebhook__CertificatePath
              value: "/tls/tls.crt"
            - name: AdmissionWebhook__PrivateKeyPath
              value: "/tls/tls.key"
          ports:
            - containerPort: 8080
              name: http
{{- if .Values.webhook.enabled }}
            - containerPort: {{ .Values.webhook.port }}
              name: webhook
{{- end }}
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
{{- if .Values.webhook.enabled }}
          volumeMounts:
            - name: webhook-tls
              mountPath: /tls
              readOnly: true
{{- end }}
          resources:
{{ toYaml .Values.resources | indent 12 }}
{{- if .Values.webhook.enabled }}
      volumes:
        - name: webhook-tls
          secret:
            secretName: {{ .Values.webhook.certificate.secretName }}
            optional: true
{{- end }}
