apiVersion: v1
kind: Namespace
metadata:
  name: tenant-a
  annotations:
    edge.promethix.net/allowed-hostname-suffixes: apps.example.com
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tunnelpublichostname-editor
  namespace: tenant-a
rules:
  - apiGroups: ["edge.promethix.net"]
    resources: ["tunnelpublichostnames"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["edge.promethix.net"]
    resources: ["tunnelpublichostnames/status"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tunnelpublichostname-editor
  namespace: tenant-a
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: tunnelpublichostname-editor
subjects:
  - kind: User
    name: tenant-a-user
