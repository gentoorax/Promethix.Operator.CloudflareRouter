apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: ghcr.io/nginxinc/nginx-unprivileged:1.29-alpine
          ports:
            - containerPort: 8443
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: demo
spec:
  selector:
    app: api
  ports:
    - name: https
      port: 8443
      targetPort: 8443
---
apiVersion: edge.promethix.net/v1alpha1
kind: TunnelPublicHostname
metadata:
  name: api-direct
  namespace: demo
spec:
  className: public
  hostname: api.example.com
  enabled: true
  tunnelRef:
    name: public-tunnel
  target:
    mode: direct
    direct:
      service:
        name: api
        namespace: demo
        port: 8443
        scheme: https
  cloudflare:
    proxied: true
