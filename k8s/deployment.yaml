apiVersion: v1
kind: Namespace
metadata:
  name: cloudflare-tunnel-operator-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: promethix-cloudflare-tunnel-operator
  namespace: cloudflare-tunnel-operator-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: promethix-cloudflare-tunnel-operator
  namespace: cloudflare-tunnel-operator-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: promethix-cloudflare-tunnel-operator
  template:
    metadata:
      labels:
        app: promethix-cloudflare-tunnel-operator
    spec:
      serviceAccountName: promethix-cloudflare-tunnel-operator
      containers:
        - name: operator
          # Supported published image locations:
          # - ghcr.io/promethixlabs/cloudflare-tunnel-operator:<tag>
          image: ghcr.io/promethixlabs/cloudflare-tunnel-operator:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: CloudflareTunnel__TunnelId
              value: REPLACE_ME
            - name: CloudflareTunnel__AccountId
              value: REPLACE_ME
            - name: CloudflareTunnel__ApiToken
              valueFrom:
                secretKeyRef:
                  name: cloudflare-api
                  key: api-token
            - name: RoutingOperator__OwnershipTag
              value: promethix-cloudflare-tunnel-operator
            - name: KubernetesOperator__ManagedClassName
              value: public
            - name: KubernetesOperator__ManagedTunnelName
              value: public-tunnel
            - name: KubernetesOperator__ManagedIngressClassName
              value: traefik-cloudflare-tunnel
            - name: KubernetesOperator__IngressTargetUrl
              value: https://traefik-cloudflare-tunnel.traefik.svc.cluster.local
            - name: KubernetesOperator__ManagedFinalizerName
              value: edge.promethix.net/tunnelpublichostname-protection
            - name: KubernetesOperator__OwnershipConfigMapNamespace
              value: cloudflare-tunnel-operator-system
            - name: KubernetesOperator__OwnershipConfigMapName
              value: promethix-cloudflare-tunnel-operator-ownership
            - name: RoutingOperator__ApplyChanges
              value: "false"
            - name: RoutingOperator__ReconciliationIntervalSeconds
              value: "30"
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
